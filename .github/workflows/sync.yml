name: Sync Rhex Image to Tencent Cloud
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Tencent Cloud TCR
        run: docker login -u "${{ secrets.TCR_USER }}" -p "${{ secrets.TCR_PWD }}" ccr.ccs.tencentyun.com

      - name: Pull, Tag and Push
        run: |
          docker pull ghcr.io/lovedevpanda/rhex:latest
          docker tag ghcr.io/lovedevpanda/rhex:latest ccr.ccs.tencentyun.com/my-rhex-space/rhex:latest
          docker push ccr.ccs.tencentyun.com/my-rhex-space/rhex:latest
